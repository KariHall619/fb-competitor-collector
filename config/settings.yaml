crawl:
  initial_days: 30
  daily_hours: 24
  default_run_time: "10:00"
  dedupe_key: post_url
  live_capture_route: opencli_browser_bridge

lead_link:
  comment_expand_rounds: 3
  reply_expand_rounds: 3
  resolve_timeout_seconds: 20
  allowed_domains: []

quality_audit:
  required_engagement_fields:
    - likes
    - comments
    - shares
  low_like_threshold: 5
  required_post_types:
    - "图文"
    - "视频"
    - "仅图片"
    - "仅文字"
  assume_lead_link_exists: true
  missing_marker_column: "是否采用"
  update_existing_rows_by: post_url

performance:
  detail_concurrency: 2
  article_concurrency: 5
  open_tab_wait_seconds: 1.5
  detail_navigation_wait_seconds: 3.5
  synthetic_tooltip_wait_ms: 1200
  real_mouse_tooltip_wait_ms: 1800
  detail_timeout_seconds: 45
  article_timeout_seconds: 12
  partial_output_enabled: true

filters:
  hot_views: 100000
  hot_likes: 100
